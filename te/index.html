<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中国疫情地图</title>
    <!--     <link rel="stylesheet" href="Bootstrap/css/bootstrap.min.css"> -->
    <!--     <script src="Bootstrap/js/bootstrap.min.js"></script> -->
    <script src="js/echarts.min.js"></script>
    <!-- arcgis模块 -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.15/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.15/"></script>
    <script src="js/jquery.js"></script>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header>
        <h1> 中国疫情地图 </h1>
        <div class="showTime"></div>
        <script>
        var formaDate = function() {
            var d = new Date()
            var year = d.getFullYear(), //多变量赋值
                month = d.getMonth() + 1, //month：从0开始
                date = d.getDate(),
                hour = d.getHours(),
                minute = d.getMinutes(),
                second = d.getSeconds();

            year = year < 10 ? '0' + year : year; //三元操作符
            month = month < 10 ? '0' + month : month;
            date = date < 10 ? '0' + date : date;
            hour = hour < 10 ? '0' + hour : hour;
            minute = minute < 10 ? '0' + minute : minute;
            second = second < 10 ? '0' + second : second;
            var a = year + '-' + month + '-' + date + ' ' + hour + ':' + minute + ':' + second
            $('.showTime').html(a);
        }
        setInterval(formaDate, 1000) //设定定时器，循环运行;
        </script>
    </header>
    <section class="mainbox">
        <!-- 左 -->
        <div class="column">
            <div class="panel bar">
                <h2>各省疫情状况</h2>
                <div class="chart"></div>
                <div class="panelFooter"></div>
            </div>
            <div class="panel line">
                <h2>各省疫情状况</h2>
                <div class="chart"></div>
                <div class="panelFooter"></div>
            </div>
            <div class="panel pie">
                <h2>各省疫情状况</h2>
                <div class="chart"></div>
                <div class="panelFooter"></div>
            </div>
        </div>
        <!-- 中 -->
        <div class="column">
            <!-- 上模块 -->
            <div class="no">
                <div class="no-hd">
                    <ul>
                        <li>12566</li>
                        <li>10000</li>
                    </ul>
                </div>
                <div class="no-bd">
                    <ul>
                        <li>当前确诊人数</li>
                        <li>累计确诊人数</li>
                    </ul>
                </div>
            </div>
            <!-- 地图模块 -->
            <div class="map">
                <div class="map1"></div>
                <div class="map2"></div>
                <div class="map3"></div>
                <div class="chart" id="viewDiv"></div>
            </div>
        </div>
        <!-- 右 -->
        <div class="column">
            <div class="panel bar1">
                <h2>各省疫情状况</h2>
                <div class="chart"></div>
                <div class="panelFooter"></div>
            </div>
            <div class="panel line1">
                <h2>各省疫情状况</h2>
                <div class="chart"></div>
                <div class="panelFooter"></div>
            </div>
            <div class="panel pie1">
                <h2>各省疫情状况</h2>
                <div class="chart"></div>
                <div class="panelFooter"></div>
            </div>
        </div>
    </section>
    <script src="js/flexible.js"></script>
    <!-- <script src="js/echarts.min.js"></script> -->
    <script src="js/arcgis.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
